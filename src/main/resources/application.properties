# Server Configuration
server.port=3000

# Oracle Database Configuration
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:ali}
spring.datasource.password=${DB_PASSWORD:ali123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Show API error messages during development
server.error.include-message=always
server.error.include-binding-errors=always

# Multipart file uploads configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Firebase Admin SDK - Service Account Key
# Placez firebase-service-account.json dans src/main/resources/
firebase.service-account-path=firebase-service-account.json